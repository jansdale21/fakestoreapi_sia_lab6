<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>MyStore Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <link rel="stylesheet" href="./style.css" />
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container py-2">
      <a class="navbar-brand d-flex align-items-center gap-2" href="#">
        <div class="brand-logo"></div>
        <div>
          <div class="fw-bold">MyStore Dashboard</div>
          <div class="text-secondary small">FakeStoreAPI Product Explorer</div>
        </div>
      </a>

      <div class="d-flex gap-2 align-items-end flex-wrap">
        <div>
          <label class="form-label small text-secondary mb-1">Search</label>
          <input id="searchInput" type="search" class="form-control" placeholder="Title / category...">
        </div>

        <div>
          <label class="form-label small text-secondary mb-1">Category</label>
          <select id="categorySelect" class="form-select">
            <option value="all">All</option>
          </select>
        </div>

        <div class="pb-1">
          <button id="refreshBtn" class="btn btn-primary">Refresh</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    <div class="card shadow-sm">
      <div class="card-header bg-white d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div class="fw-semibold">All Products</div>
        <div class="d-flex gap-3 align-items-center">
          <span id="countText" class="text-secondary small">Loading…</span>
          <span id="errorText" class="text-danger small" role="status" aria-live="polite"></span>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th style="width:70px;">ID</th>
              <th>Title</th>
              <th style="width:120px;">Price</th>
              <th style="width:200px;">Category</th>
              <th style="width:90px;" class="text-center">Image</th>
            </tr>
          </thead>
          <tbody id="productsTbody">
          </tbody>
        </table>
      </div>

      <div id="loadingRow" class="p-3 text-secondary" hidden>Fetching products…</div>
    </div>
  </main>

  <!-- Bootstrap Modal -->
  <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Product</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-5">
              <div class="border rounded p-2 bg-light d-flex align-items-center justify-content-center" style="min-height:260px;">
                <img id="modalImage" alt="" class="img-fluid" style="max-height:260px; object-fit:contain;">
              </div>
            </div>
            <div class="col-md-7">
              <div class="mb-2">
                <span class="badge text-bg-secondary" id="modalCategory">category</span>
              </div>

              <div class="fs-5 fw-semibold mb-2" id="modalTitleText"></div>

              <div class="d-flex flex-wrap gap-3 mb-3">
                <div><span class="text-secondary">Price:</span> <span class="fw-semibold" id="modalPrice"></span></div>
                <div><span class="text-secondary">Rating:</span> <span class="fw-semibold" id="modalRating"></span></div>
              </div>

              <p class="mb-0" id="modalDescription"></p>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
